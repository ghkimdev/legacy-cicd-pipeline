<Location /svn>
    DAV svn
    SVNParentPath /var/svn/repos
    SVNListParentPath on
    
    AuthType Basic
    AuthName "SVN Repository"

    AuthBasicProvider ldap
    AuthLDAPURL "ldaps://ldap:636/ou=users,dc=example,dc=com?uid"
    AuthLDAPBindDN "cn=admin,dc=example,dc=com"
    AuthLDAPBindPassword "AdminPass123"

    Require valid-user
</Location>

