[req]
default_bits = 4096
prompt = no
default_md = sha256
distinguished_name = req_distinguished_name
req_extensions = v3_req

[req_distinguished_name]
C = KR
ST = Seoul
L = Seoul
O = MyCompany
OU = IT
CN = ldap

[v3_req]
subjectAltName = @alt_names

[alt_names]
DNS.1 = ldap
DNS.2 = ldap.example.com
DNS.3 = localhost
IP.1 = 127.0.0.1
IP.2 = 172.17.0.2
