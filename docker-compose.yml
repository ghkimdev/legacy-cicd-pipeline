services:
  nginx:
    image: nginx:1.29
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "5000:5000"
      - "5001:5001"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/certs:/etc/nginx/certs
    networks:
      - cicd-net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
 
  jenkins:
    build:
      context: ./jenkins
      dockerfile: docker/Dockerfile
    hostname: jenkins.example.com
    container_name: jenkins
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - cicd-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/login >/dev/null || wget -q --spider http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    depends_on:
      ldap:
        condition: service_healthy
 
  nexus:
    build:
      context: ./nexus
      dockerfile: docker/Dockerfile
    hostname: nexus.example.com
    container_name: nexus
    restart: unless-stopped
    env_file:
      - .env
    environment:
      INSTALL4J_ADD_VM_PARAMS: ${INSTALL4J_ADD_VM_PARAMS}
    volumes:
      - nexus_data:/nexus-data
    networks:
      - cicd-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/service/rest/v1/status >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    depends_on:
      ldap:
        condition: service_healthy

  nexus-init:
    image: alpine:3.23
    env_file:
      - .env
    entrypoint: >
      sh -c "
        apk add --no-cache curl jq gettext &&
        chmod +x /scripts/*.sh &&
        /scripts/provision.sh
      "
    volumes:
      - ./nexus/scripts:/scripts
      - ./nexus/templates:/templates
      - nexus_data:/nexus-data
    networks:
      - cicd-net
    depends_on:
      - nexus

  rundeck:
    build:
      context: ./rundeck
      dockerfile: docker/Dockerfile
    hostname: rundeck.example.com
    container_name: rundeck
    restart: unless-stopped
    environment:
      RUNDECK_GRAILS_URL: ${RUNDECK_GRAILS_URL}
      RUNDECK_SERVER_FORWARDED: "true"
      RUNDECK_JAAS_MODULES_0: JettyCombinedLdapLoginModule
      RUNDECK_JAAS_LDAP_PROVIDERURL: ldaps://${LDAP_HOST}:${LDAPS_PORT}
      RUNDECK_JAAS_LDAP_BINDDN: ${LDAP_BIND_DN}
      RUNDECK_JAAS_LDAP_BINDPASSWORD: ${LDAP_BIND_PASSWORD}
      RUNDECK_JAAS_LDAP_USERBASEDN: ${LDAP_USER_BASE},${LDAP_BASE_DN}
      RUNDECK_JAAS_LDAP_ROLEBASEDN: ${LDAP_ROLE_BASE},${LDAP_BASE_DN}
    volumes:
      - rundeck_data:/home/rundeck/server/data
    networks:
      - cicd-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null -w '%{http_code}' http://localhost:4440/ | grep -qE '200|302'"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 90s
    depends_on:
      ldap:
        condition: service_healthy

  svn:
    build: 
      context: ./svn
      dockerfile: docker/Dockerfile
    hostname: svn.example.com
    container_name: svn
    restart: unless-stopped
    env_file:
      - .env 
    volumes:
      - ./svn/repos:/var/svn/repos
      - ./svn/seed:/seed
      - ./svn/hooks:/hooks
    networks:
      - cicd-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null -w '%{http_code}' http://localhost/ | grep -qE '200|401|403' || nc -z localhost 80"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      ldap:
        condition: service_healthy

  ldap:
    container_name: ldap
    image: osixia/openldap:1.5.0
    environment:
      LDAP_ORGANISATION: ${LDAP_ORGANISATION}
      LDAP_DOMAIN: ${LDAP_DOMAIN}
      LDAP_ADMIN_PASSWORD: ${LDAP_BIND_PASSWORD}
      LDAP_TLS: true
      LDAP_TLS_CRT_FILENAME: ${LDAP_TLS_CRT_FILENAME}
      LDAP_TLS_KEY_FILENAME: ${LDAP_TLS_KEY_FILENAME}
      LDAP_TLS_CA_CRT_FILENAME: ${LDAP_TLS_CA_CRT_FILENAME}
      LDAP_TLS_VERIFY_CLIENT: never
    volumes:
      - ldap_data:/var/lib/ldap
      - ./ldap/ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom
      - ./ldap/certs:/container/service/slapd/assets/certs
    command: --copy-service
    networks:
      - cicd-net
    healthcheck:
      test: ["CMD-SHELL", "ldapsearch -x -H ldap://localhost:389 -b '' -s base '(objectclass=*)' >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
 
  ldapadmin:
    container_name: ldapadmin
    image: osixia/phpldapadmin:0.9.0
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: ldap
      PHPLDAPADMIN_HTTPS: false
    ports:
      - "8080:80"
    networks:
      - cicd-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://localhost/ || wget -q --spider http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      ldap:
        condition: service_healthy

  mailhog:
    container_name: mailhog
    image: mailhog/mailhog:v1.0.1
    volumes:
      - mailhog_data:/data
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - cicd-net

# ── 네트워크 ──────────────────────────────────────────────────────────────────
networks:
  cicd-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

# ── 볼륨 ──────────────────────────────────────────────────────────────────────
volumes:
  jenkins_home:
  nexus_data:
  rundeck_data:
  ldap_data:
  mailhog_data:
