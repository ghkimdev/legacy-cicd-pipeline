version: '3'

services:
    ldap:
        container_name: cicd-ldap
        image: osixia/openldap:latest 
        environment:
          LDAP_ORGANISATION: "Gwangho Corp"
          LDAP_DOMAIN: "gwangho.com"
          LDAP_ADMIN_PASSWORD: "admin"
        volumes:
          - ldap_conf:/container/service/slapd
          - ldap_data:/var/lib/ldap
          - ./ldap:/container/service/slapd/assets/config/bootstrap/ldif/custom
        ports:
          - "389:389"
          - "636:636"
        command: --copy-service
        networks:
          - cicd-net

    ldapadmin:
        container_name: cicd-ldapadmin
        image: osixia/phpldapadmin:latest
        environment:
          PHPLDAPADMIN_LDAP_HOSTS: ldap
          PHPLDAPADMIN_HTTPS: false
        volumes:
          - ladpadmin_conf:/container/service/phpldapadmin
        ports:
          - "8080:80"
        networks:
          - cicd-net
        depends_on:
          - ldap

# ── 네트워크 ──────────────────────────────────────────────────────────────────
networks:
  cicd-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

# ── 볼륨 ──────────────────────────────────────────────────────────────────────
volumes:
  ldap_conf:
  ldap_data:
  ldapadmin_conf:
