jenkins:
  systemMessage: "Legacy CI/CD Pipeline"

  securityRealm:
    ldap:
      configurations:
        - server: "${LDAP_URL}"
          rootDN: "${LDAP_BASE_DN}"
          userSearchBase: "${LDAP_USER_BASE}"
          userSearch: "uid={0}"
          groupSearchBase: "${LDAP_ROLE_BASE}"
          managerDN: "${LDAP_BIND_DN}"
          managerPasswordSecret: "${LDAP_BIND_PASSWORD}"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

unclassified:
  location:
    url: "https://jenkins.example.com"

  mailer:
    smtpHost: "mailhog"
    smtpPort: "1025"
